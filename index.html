<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="/src/index.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Портфолио</title>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      
      #preloader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      .loader-circles {
        display: flex;
        gap: 12px;
      }
      
      .circle {
        width: 16px;
        height: 16px;
        border-radius: 50%;
      }
      
      .circle.red { background-color: #ef4444; }
      .circle.yellow { background-color: #eab308; }
      .circle.green { background-color: #22c55e; }
      
      @keyframes bounce {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }
      
      .circle {
        animation: bounce 0.8s infinite;
      }
      
      .circle.red { animation-delay: 0s; }
      .circle.yellow { animation-delay: 0.2s; }
      .circle.green { animation-delay: 0.4s; }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="loader-circles">
        <div class="circle red"></div>
        <div class="circle yellow"></div>
        <div class="circle green"></div>
      </div>
    </div>


    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      window.addEventListener('load', function() {
        const preloader = document.getElementById('preloader');
        if (preloader) {
          preloader.classList.add('fade-out');
          setTimeout(() => {
            preloader.style.display = 'none';
          }, 300);
        }
      });
    </script>
  </body>
</html>
